<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Message Sent | Fromentin Industries</title>

  <link rel="icon" href="assets/favicon">
  <link rel="apple-touch-icon" href="assets/favicon">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page-loader">
    <div class="loader-mark">FI</div>
  </div>

  <header class="hero service-hero">
    <div class="hero-background-grid"></div>
    <div class="hero-scanline"></div>

    <div class="hero-content">
      <img src="assets/logo" alt="Fromentin Industries Logo" class="logo reveal reveal-delay-1">

      <p class="eyebrow reveal reveal-delay-2">Message Received</p>

      <h1 class="reveal reveal-delay-3">Request Sent</h1>

      <p class="tagline reveal reveal-delay-4">
        Your message has been submitted to Fromentin Industries.
      </p>

      <p class="hero-description reveal reveal-delay-5">
        Thank you for reaching out. The request has been received through the contact system.
      </p>

      <div class="hero-buttons reveal reveal-delay-6">
        <a href="index.html" class="button primary-button">Return Home</a>
      </div>
    </div>
  </header>

  <script>
    window.addEventListener("load", () => {
      document.body.classList.add("loaded");
    });
  </script>

</body>
</html>
